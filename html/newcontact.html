<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact SSC</title>
    <link rel="icon" href="img/white-goose.png" type="image/x-icon">
    <link rel="stylesheet" href="css/contactstyle.css">
</head>

<body>
    <div class="bg-img">
        <container class="contailer">
            <form action="https://httpbin.org/get" class="container" method="get">
                <!-- <h1>Contact Us</h1> -->

                <label for="email"><!-- <b>Email</b> --></label>
                <input type="text" placeholder="Enter Email address" name="email" required>

                <label for="sub"><!-- <b>Subject:</b> --></label>
                <input type="subject" placeholder="Enter subject" name="subject" required>

                <label for="message"><!-- Your Message: --></label>
                <textarea name="message" id="message" cols="25" rows="8"
                    placeholder="Type your message here"></textarea>
                <button type="submit" class="btn">Send It</button>

            </form>
        </container>
    </div>
    <!-- <footer>
        <p>&copy;Sanctuary on Spruce Creek HOA, Inc.</p>
    </footer> -->
</body>


</html>
