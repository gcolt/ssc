<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="George Colt">
    <meta name="description" content="Contact info for TOUT Management">
    <title>Contact Us</title>
    <link rel="icon" href="img/white-goose.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>Contact Us</h1>
    <nav>
        <ul>
            <li>
                <a href="/">Home</a>
            </li>
        </ul>
    </nav>

    <figure>
        <img src="img/tacos_close_up_400x260.png" alt="SSC Contact form" title="" width="400" height="260">
        <figcaption>
            <header>
                SSC
        </figcaption>
    </figure>
    </header>
    <hr>
    <main>
        <section>
            <h2>Our Contact Form</h2>

            <form action="https://httpbin.org/get" method="get">
                <fieldset>
                    <legend>Send Us A Message</legend>
                    <p>
                        <label for="name">Name:</label>
                        <input type="text" name="name" id="name" placeholder="your name" required>
                    </p>
                    <p>
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" placeholder="your email" required>
                    </p>
                    <p>
                        <label for="message">Your Message:</label>
                        <br>
                        <textarea name="message" id="message" cols="30" rows="10"
                            placeholder="Type your message here"></textarea>
                    </p>
                </fieldset>
                <button type="submit">Send</button>
                <button type="reset">Reset</button>
            </form>
        </section>
        <section>
            <h2>Our Management Company</h2>
            <address>
                TOUT Management, LLC.<br>
                1326 South Ridgewood Ave. # 14<br>
                Daytona Beach, FL 32114<br>
                <br>
                Phone: <a href="tel:+5555555555"> (386) 767-5575</a>
            </address>
        </section>
    </main>
    <hr>
    <footer>
        <p>Copyright &copy; Sanctuary on Spruce Creek HOA, Inc.</p>
    </footer>
</body>

</html>
